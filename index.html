<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <title>BILLING PS DODI JAYA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
    body { background-color: #f4f6f9; padding: 20px; color: #333; }
    .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid #ddd; }
    .title { color: #2c3e50; font-weight: bold; }
    .btn-group-header { display: flex; gap: 10px; }
    .btn { padding: 10px 16px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
    .btn-dark { background-color: #2c3e50; color: white; }
    .btn-dark:hover { background-color: #1a252f; }
    .btn-success { background-color: #2ecc71; color: white; width: 100%; margin-top: 5px; }
    .btn-danger { background-color: #e74c3c; color: white; width: 100%; margin-top: 5px; margin-bottom: 8px; }
    .btn-warning { background-color: #f1c40f; color: #333; width: 100%; margin-top: 5px; font-weight: bold; }
    .row { display: flex; flex-wrap: wrap; margin: 0 -10px; }
    .col { flex: 0 0 33.333%; padding: 0 10px; margin-bottom: 20px; }
    @media (max-width: 900px) { .col { flex: 0 0 50%; } }
    @media (max-width: 600px) { .col { flex: 0 0 100%; } }
    .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e0e0e0; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .ps-title { font-size: 1.3rem; font-weight: bold; }
    .badge { padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; color: white; }
    .bg-success { background-color: #2ecc71; }
    .bg-danger { background-color: #e74c3c; }
    .timer { font-size: 2.2rem; font-weight: bold; text-align: center; color: #e74c3c; font-family: monospace; margin: 12px 0; background: #fdf2f2; border-radius: 8px; padding: 5px; letter-spacing: 2px; }
    .info-text { text-align: center; font-size: 0.85rem; color: #7f8c8d; margin-bottom: 12px; line-height: 1.4; }
    .form-group { margin-bottom: 10px; }
    .form-group label { display: block; font-size: 0.75rem; font-weight: bold; color: #7f8c8d; margin-bottom: 4px; }
    .form-control { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.9rem; background-color: #fff; }
    .jajanan-box { background-color: #fffde7; border: 1px dashed #f1c40f; padding: 12px; border-radius: 8px; margin-top: 15px; }
    .jajanan-list { font-size: 0.8rem; color: #c0392b; font-weight: bold; margin-top: 6px; background: white; padding: 5px; border-radius: 4px; border: 1px solid #f9e79f; }
    .loading-screen { text-align: center; padding: 60px 0; width: 100%; }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #2c3e50; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .alert-error { background-color: #fde8e7; color: #9c241a; padding: 25px; border-radius: 8px; border: 1px solid #f5c2be; text-align: center; width: 100%; }
  </style>
</head>
<body>

<div class="header-bar">
  <h2 class="title">BILLING PS DODI JAYA</h2>
  <div class="btn-group-header">
    <button onclick="bukaLaporanBulanan()" class="btn btn-dark">📊 CETAK BULANAN</button>
    <button onclick="load()" class="btn btn-dark">🔄 REFRESH DATA</button>
  </div>
</div>

<div id="content" class="row">
  <div class="loading-screen">
    <div class="spinner"></div>
    <h3>Sinkronisasi Database...</h3>
  </div>
</div>

<script>
  // PASTIKAN URL WEB APP GOOGLE SCRIPT ANDA DI BAWAH INI SUDAH BENAR
  const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyuZZn52NlwNehwSV_rbxZXC0318hUgxaX9AvedQEsIn6OKKTiO9JVaCsEWkVEVFtfx/exec";
  
  window.SistemKasir = {
    withSuccessHandler: function(cb) { this.successCb = cb; return this; },
    withFailureHandler: function(cb) { this.failCb = cb; return this; },
    panggilServer: function(urlParams) {
      const callbackName = "jsonp_" + Math.round(100000 * Math.random());
      window[callbackName] = (data) => {
        delete window[callbackName];
        var scriptEl = document.getElementById(callbackName);
        if(scriptEl) scriptEl.remove();
        if (data && data.error) this.failCb(data.error); else this.successCb(data);
      };
      const script = document.createElement("script");
      script.id = callbackName;
      script.src = GOOGLE_SCRIPT_URL + urlParams + "&callback=" + callbackName;
      script.onerror = () => this.failCb("Gagal tersambung ke Server Google Script.");
      document.body.appendChild(script);
    },
    getAppData: function() { this.panggilServer("?action=getAppData"); },
    mulaiMain: function(id, jam, tipe) { this.panggilServer(`?action=mulaiMain&id=${id}&jam=${jam}&tipe=${tipe}`); },
    tambahJajananKeSheet: function(id, nama, harga) { this.panggilServer(`?action=tambahJajanan&id=${id}&nama=${encodeURIComponent(nama)}&harga=${harga}`); },
    resetPS: function(id) { this.panggilServer(`?action=resetPS&id=${id}`); }
  };

  let intervals = {};
  let menuGlobal = [];
  let dataPSGlobal = [];

  function load() {
    Object.keys(intervals).forEach(k => clearInterval(intervals[k]));
    document.getElementById('content').innerHTML = '<div class="loading-screen"><div class="spinner"></div><h3>Sinkronisasi Database...</h3></div>';
    SistemKasir.withSuccessHandler(render).withFailureHandler(tanganiError).getAppData();
  }

  function tanganiError(err) {
    document.getElementById('content').innerHTML = `
      <div class="alert-error">
        <h3>⚠️ Hubungan Database Terputus</h3>
        <p style="font-size: 0.9rem; margin-top: 5px;">Detail Masalah: ${JSON.stringify(err)}</p>
        <button onclick="load()" class="btn btn-dark" style="margin-top:10px;">Coba Sambungkan Ulang</button>
      </div>
    `;
  }

  function render(data) {
    menuGlobal = data.menu || [];
    dataPSGlobal = data.ps || [];
    const container = document.getElementById('content');
    container.innerHTML = '';

    dataPSGlobal.forEach(item => {
      const isMain = item.status.toUpperCase().indexOf("MAIN") !== -1 || item.status.toUpperCase().indexOf("🔴") !== -1;
      
      let options = `<option value="">-- Pilih Jajanan Kasir --</option>`;
      menuGlobal.forEach((m) => {
        if(m && m[0] && m[0].toString().trim() !== "") {
          let namaJajan = m[0].toString().trim();
          let hargaClean = m[1].toString().replace(/[^0-9.-]+/g,"");
          let hargaJajan = parseFloat(hargaClean) || 0;
          options += `<option value="${namaJajan}" data-harga="${hargaJajan}">${namaJajan} (Rp ${hargaJajan.toLocaleString('id-ID')})</option>`;
        }
      });

      let jamSelesaiTampil = item.selesai || "";
      let riwayatJajananTeks = "";
      if (item.selesai && item.selesai.indexOf(" | Jrn:") !== -1) {
        let bagian = item.selesai.split(" | Jrn:");
        jamSelesaiTampil = bagian[0];
        riwayatJajananTeks = bagian[1];
      }

      // Bersihkan teks tanggal jika terselip otomatis di kolom selesai
      if (jamSelesaiTampil.includes("/")) {
        var partsTanggal = jamSelesaiTampil.split(" ");
        if(partsTanggal.length > 1) {
          jamSelesaiTampil = partsTanggal[1]; // ambil bagian jam saja
        }
      }
      
      // Ambil format jam menit bersih (HH:mm)
      var matchJam = jamSelesaiTampil.match(/(\d{2}):(\d{2})/);
      if (matchJam) {
        jamSelesaiTampil = matchJam[1] + ":" + matchJam[2];
      }

      const col = document.createElement('div');
      col.className = 'col';
      
      let cardHTML = `
        <div class="card">
          <div class="card-header">
            <span class="ps-title">${item.noPS}</span>
            <span class="badge ${isMain ? 'bg-danger' : 'bg-success'}">${isMain ? '🔴 MAIN' : '🟢 Tersedia'}</span>
          </div>
      `;

      if (isMain) {
        cardHTML += `
          <div class="timer" id="t-${item.noPS}">--:--:--</div>
          <div class="info-text">Jam Selesai: <b>${jamSelesaiTampil} WIB</b><br>Total Billing: <b>Rp ${item.biaya.toLocaleString('id-ID')}</b></div>
          <button onclick="cetakNotaLangsung('${item.noPS}')" class="btn btn-dark" style="width:100%; margin-bottom:6px;">🖨️ CETAK NOTA KASIR</button>
          <button onclick="stop('${item.noPS}')" class="btn btn-danger">SELESAI & SIMPAN OMSET</button>
        `;
      } else {
        cardHTML += `
          <div class="form-group">
            <label>Pilih Mesin / Layanan:</label>
            <select id="type-${item.noPS}" class="form-control">
              <option value="PS3">🎮 PLAYSTATION 3 (Rp5.000/Jam)</option>
              <option value="PS4">🎮 PLAYSTATION 4 (Rp10.000/Jam)</option>
              <option value="WIFI">📶 SEWA WIFI (Rp5.000/Jam)</option>
            </select>
          </div>
          <div class="form-group">
            <label>Set Jam Main:</label>
            <input type="number" id="h-${item.noPS}" class="form-control" placeholder="Berapa jam? misal: 2" min="0.5" step="0.5">
          </div>
          <button onclick="start('${item.noPS}')" class="btn btn-dark" style="width:100%;">START BILLING</button>
        `;
      }

      cardHTML += `
          <div class="jajanan-box">
            <label style="font-size:0.75rem; font-weight:bold; color:#7f8c8d;">🛒 Menu Jajanan:</label>
            <select id="m-${item.noPS}" class="form-control" style="margin-top:4px;">${options}</select>
            <button onclick="pesan('${item.noPS}')" class="btn btn-warning" ${isMain ? '' : 'disabled'}>➕ Masukkan ke Billing</button>
            <div class="jajanan-list" id="list-jajanan-${item.noPS}">
              ${riwayatJajananTeks ? 'Item: ' + riwayatJajananTeks : 'Belum jajan'}
            </div>
          </div>
        </div>
      `;

      col.innerHTML = cardHTML;
      container.appendChild(col);

      if (isMain && jamSelesaiTampil && jamSelesaiTampil.includes(":")) {
        runTimerPintar(item.noPS, jamSelesaiTampil);
      }
    });
  }

  function runTimerPintar(id, jamSelesaiStr) {
    try {
      let bagian = jamSelesaiStr.trim().split(":");
      if (bagian.length < 2) return;
      
      const targetJam = parseInt(bagian[0], 10);
      const targetMenit = parseInt(bagian[1], 10);
      
      function hitung() {
        const sekarang = new Date();
        const target = new Date();
        target.setHours(targetJam, targetMenit, 0, 0);
        
        if (target.getTime() < sekarang.getTime() && (sekarang.getTime() - target.getTime() > 6 * 60 * 60 * 1000)) {
          target.setDate(target.getDate() + 1);
        }
        
        const diff = target.getTime() - sekarang.getTime();
        const el = document.getElementById('t-' + id);
        if (!el) return;
        
        if (diff <= 0) { 
          el.innerHTML = "WAKTU HABIS!"; 
          el.style.color = "#d35400"; 
          clearInterval(intervals[id]);
          return; 
        }
        
        const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
        const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
        const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
        el.innerHTML = h + ':' + m + ':' + s;
      }
      
      hitung();
      intervals[id] = setInterval(hitung, 1000);
    } catch(e) {
      console.log(e);
    }
  }

  function start(id) {
    const jam = document.getElementById('h-' + id).value;
    const tipe = document.getElementById('type-' + id).value;
    if (!jam || parseFloat(jam) <= 0) return alert("Durasi main belum diisi!");
    document.getElementById('content').innerHTML = '<div class="loading-screen"><div class="spinner"></div><h3>Sedang Menyimpan Sesi Main...</h3></div>';
    SistemKasir.withSuccessHandler(load).withFailureHandler(tanganiError).mulaiMain(id, jam, tipe);
  }

  function pesan(id) {
    const selectEl = document.getElementById('m-' + id);
    if (!selectEl.value) return alert("Silakan pilih menu makanan/minuman!");
    const opt = selectEl.options[selectEl.selectedIndex];
    const namaJajanan = selectEl.value;
    const hargaJajanan = opt.getAttribute('data-harga');
    
    document.getElementById('content').innerHTML = '<div class="loading-screen"><div class="spinner"></div><h3>Memasukkan Jajanan...</h3></div>';
    SistemKasir.withSuccessHandler(load).withFailureHandler(tanganiError).tambahJajananKeSheet(id, namaJajanan, hargaJajanan);
  }

  function stop(id) {
    if (confirm("Selesaikan billing " + id + " dan simpan pendapatan?")) {
      document.getElementById('content').innerHTML = '<div class="loading-screen"><div class="spinner"></div><h3>Menyimpan Pendapatan...</h3></div>';
      SistemKasir.withSuccessHandler(load).withFailureHandler(tanganiError).resetPS(id);
    }
  }

  function cetakNotaLangsung(id) {
    const item = dataPSGlobal.find(p => p.noPS === id);
    if (!item) return alert("Gagal mencetak nota.");
    let riwayat = "Tidak ada jajanan";
    if (item.selesai && item.selesai.indexOf(" | Jrn:") !== -1) riwayat = item.selesai.split(" | Jrn:")[1];
    
    let jamSelesaiClean = item.selesai.split(" | Jrn:")[0];

    const win = window.open("", "_blank");
    win.document.write('<html><head><title>NOTA</title><style>body{font-family:monospace;width:52mm;font-size:10px;margin:0;padding:4px;}.line{border-top:1px dashed #000;margin:5px 0;}.text-center{text-align:center;}</style></head><body><div class="text-center"><b>BILLING DODI JAYA</b></div><div class="line"></div>Station : ' + item.noPS + '<br>Durasi  : ' + item.durasi + ' Jam<br>Selesai : ' + jamSelesaiClean + ' WIB<div class="line"></div><b>Jajanan:</b><br>' + riwayat + '<div class="line"></div><b>TOTAL: Rp ' + item.biaya.toLocaleString('id-ID') + '</b><br><div class="line"></div><div class="text-center">Terima Kasih!</div></body></html>');
    win.document.close();
    setTimeout(function(){ win.print(); win.close(); }, 250);
  }

  // JAMINAN BEBAS ERROR: Langsung membuka layout cetak PDF resmi untuk lembar 'Laporan' Anda
  function bukaLaporanBulanan() {
    var spreadsheetId = "1q5l7KVYd8fxtXeVzOc3kV3ekuwQ2iSyFqgZaEk0NPkE";
    var gidLaporan = "1114515535"; 
    
    var urlPrint = "https://docs.google.com/spreadsheets/d/" + spreadsheetId + "/export?exportFormat=pdf&format=pdf" + 
                   "&size=A4" +             // Kertas A4
                   "&portrait=true" +       // Posisi Tegak (Portrait)
                   "&fitw=true" +           // Pas lebar halaman
                   "&gridlines=true" +      // Memunculkan garis pembatas tabel agar rapi saat dicetak
                   "&printtitle=false" + 
                   "&sheetnames=false" + 
                   "&fzr=false" + 
                   "&gid=" + gidLaporan;
    
    window.open(urlPrint, "_blank");
  }

  window.onload = load;
</script>
</body>
</html>
