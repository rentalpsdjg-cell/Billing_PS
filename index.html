<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
  <style>
    body { background-color: #f0f2f5; font-family: sans-serif; padding: 15px; }
    .card-ps { border: none; border-radius: 15px; transition: 0.3s; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .timer { font-size: 2.2rem; font-weight: bold; color: #d63031; font-family: monospace; letter-spacing: 2px; }
    .status-badge { font-size: 0.8rem; padding: 5px 15px; border-radius: 50px; font-weight: bold; }
    .jajanan-section { background: #fff9db; padding: 12px; border-radius: 10px; border: 2px dashed #f59f00; margin-top: 15px; }
    .list-jajanan-lokal { font-size: 0.85rem; color: #d63031; margin-top: 5px; font-weight: bold; }
    .ts-wrapper { background: #fff; border-radius: 5px; }
  </style>
</head>
<body>

<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-4 mt-2">
    <h2 class="fw-bold text-primary m-0">BILLING PS DODI JAYA</h2>
    <div>
      <button onclick="cetakLaporanBulanan()" class="btn btn-warning fw-bold shadow-sm me-2">📊 Cetak Bulanan</button>
      <button onclick="load()" class="btn btn-dark shadow-sm">🔄 REFRESH DATA</button>
    </div>
  </div>

  <div id="content" class="row">
    <div class="text-center mt-5">Memuat Sistem Kasir...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>

<script>
  let intervals = {};
  let menuGlobal = [];
  let dataPSGlobal = [];
  let tomSelectInstances = {};

  // Fungsi memuat data utama dari backend spreadsheet
  function load() {
    // Hancurkan sisa-sisa pencarian TomSelect lama agar tidak menumpuk di memori browser
    Object.keys(tomSelectInstances).forEach(k => {
      if(tomSelectInstances[k]) tomSelectInstances[k].destroy();
    });
    tomSelectInstances = {};
    
    document.getElementById('content').innerHTML = `
      <div class="text-center mt-5 py-5">
        <div class="spinner-border text-primary mb-3" role="status"></div>
        <h4>🔄 Memuat Data Terbaru...</h4>
        <p class="text-muted small">Mengambil data dari Google Sheet. Harap tunggu...</p>
      </div>
    `;
    
    // Menghubungkan langsung ke fungsi getAppData() di file Kode.gs
    google.script.run
      .withSuccessHandler(render)
      .withFailureHandler(tanganiError)
      .getAppData();
  }

  // Fungsi pengaman jika koneksi ke spreadsheet terputus/nama sheet salah
  function tanganiError(err) {
    document.getElementById('content').innerHTML = `
      <div class="col-12 mt-4">
        <div class="alert alert-danger shadow-sm text-center" role="alert">
          <h4 class="alert-heading fw-bold">⚠️ Gagal Memuat Data!</h4>
          <p class="mb-2">Sistem tidak bisa membaca data dari Google Sheets backend Anda.</p>
          <hr>
          <div class="text-start bg-light p-3 font-monospace text-dark rounded mb-3 small" style="max-height: 150px; overflow-y: auto;">
            <b>Pesan Error:</b> ${err.message || err}
          </div>
          <p class="small text-muted mb-3">Saran: Periksa apakah nama tab sheet Anda sudah bernama <b>"Dashboard"</b> dan <b>"Menu"</b>.</p>
          <button onclick="load()" class="btn btn-danger fw-bold px-4">Coba Hubungkan Ulang</button>
        </div>
      </div>
    `;
  }

  // Fungsi menyusun kotak-kotak (cards) billing stasiun PS secara dinamis
  function render(data) {
    // Hentikan semua jalannya timer aktif sebelum memuat ulang komponen
    Object.keys(intervals).forEach(k => clearInterval(intervals[k]));
    
    menuGlobal = data.menu || [];
    dataPSGlobal = data.ps || [];
    const container = document.getElementById('content');
    container.innerHTML = '';

    if(dataPSGlobal.length === 0) {
      container.innerHTML = '<div class="text-center col-12 mt-5 text-muted">Tidak ada data Station PS di sheet Dashboard.</div>';
      return;
    }

    dataPSGlobal.forEach(item => {
      const isMain = item.status.includes("🔴 MAIN") || item.status.includes("🔴 SEWA");
      
      // Membuat list drop-down jajanan secara terstruktur memakai sistem index pengaman
      let options = `<option value="">Cari/Pilih Jajanan...</option>`;
      options += menuGlobal.map((m, index) => {
        if(!m[0] || m[1] === undefined || m[1] === "") return '';
        
        if(parseInt(m[1]) === 0) {
          return `<option value="" disabled class="fw-bold text-secondary">${m[0]}</option>`;
        }
        
        return `<option value="${index}-${m[1]}" data-nama="${m[0]}" data-harga="${m[1]}">${m[0]} (Rp ${parseInt(m[1]).toLocaleString('id-ID')})</option>`;
      }).join('');

      let jamSelesaiTampil = item.selesai;
      let riwayatJajananTeks = "";
      
      if (item.selesai && item.selesai.indexOf(" | Jrn:") !== -1) {
        let bagian = item.selesai.split(" | Jrn:");
        jamSelesaiTampil = bagian[0];
        riwayatJajananTeks = bagian[1];
      }

      const div = document.createElement('div');
      div.className = 'col-md-4';
      
      let htmlContent = `
        <div class="card card-ps">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center">
              <h4 class="m-0 fw-bold text-dark">${item.noPS}</h4>
              <span class="status-badge ${isMain ? 'bg-danger text-white' : 'bg-success text-white'}">${item.status}</span>
            </div>
            <hr class="my-2">
      `;

      if (isMain) {
        let labelCetak = "🖨️ CETAK NOTA SEWA";
        if(item.tipePS === "WIFI") labelCetak = "🖨️ CETAK NOTA WIFI";
        else if(item.tipePS === "PS2") labelCetak = "🖨️ CETAK NOTA PS2";
        else if(item.tipePS === "PS4") labelCetak = "🖨️ CETAK NOTA PS4";

        htmlContent += `
          <div class="text-center timer my-2" id="t-${item.noPS}">--:--:--</div>
          <p class="text-center text-muted small mb-3">Selesai: <b>${jamSelesaiTampil}</b> | Total: <b>Rp ${item.biaya.toLocaleString('id-ID')}</b></p>
          <button onclick="cetakNotaLangsung('${item.noPS}')" class="btn btn-outline-secondary w-100 fw-bold mb-2">${labelCetak}</button>
          <button onclick="stop('${item.noPS}')" class="btn btn-danger w-100 fw-bold mb-2">SELESAI & BAYAR</button>
        `;
      } else {
        htmlContent += `
          <div class="py-2">
            <label class="small text-muted fw-bold mb-1">Pilih Mesin / Layanan:</label>
            <select id="type-${item.noPS}" class="form-select mb-2">
              <option value="PS3">🎮 PLAYSTATION 3 (Rp5.000/Jam)</option>
              <option value="PS2">🎮 PLAYSTATION 2 (Rp5.000/Jam)</option>
              <option value="PS4">🎮 PLAYSTATION 4 (Rp10.000/Jam)</option>
              <option value="WIFI">📶 SEWA WIFI (Rp5.000/Jam)</option>
            </select>
            
            <label class="small text-muted fw-bold mb-1">Atur Durasi (Jam):</label>
            <div class="input-group mb-3">
              <input type="number" id="h-${item.noPS}" class="form-control" placeholder="Contoh: 2" min="0.5" step="0.5">
              <button onclick="start('${item.noPS}')" class="btn btn-success px-4 fw-bold">MULAI</button>
            </div>
            <button onclick="cetakKuponAwal('${item.noPS}')" class="btn btn-sm btn-outline-primary w-100 fw-bold mb-1">🎟️ CETAK KUPON DI AWAL</button>
          </div>
        `;
      }

      htmlContent += `
        <div class="jajanan-section">
          <label class="small fw-bold text-dark d-block mb-1">🛒 Tambah Jajanan / Snack Kasir:</label>
          <div class="mb-2">
            <select id="m-${item.noPS}" class="form-select dropdown-pencarian">${options}</select>
          </div>
          <button onclick="pesan('${item.noPS}')" class="btn btn-warning btn-sm w-100 fw-bold text-dark" ${isMain ? '' : 'disabled'}>➕ Masukkan ke Billing</button>
          <div class="list-jajanan-lokal" id="list-jajanan-${item.noPS}">
            ${riwayatJajananTeks ? 'Terbeli: ' + riwayatJajananTeks : 'Belum belanja jajanan'}
          </div>
        </div>
      `;

      htmlContent += '</div></div>';
      div.innerHTML = htmlContent;
      container.appendChild(div);
      
      // Inisialisasi plugin pencarian TomSelect secara mandiri untuk tiap station PS
      tomSelectInstances[item.noPS] = new TomSelect(`#m-${item.noPS}`, {
        create: false,
        sortField: { field: "text", direction: "asc" },
        placeholder: "Ketik nama jajanan / harga..."
      });
      
      if (isMain && item.selesaiRaw) {
        runTimer(item.noPS, item.selesaiRaw);
      }
    });
  }

  // Perhitungan hitung mundur jam rental secara realtime (waktu lokal kasir)
  function runTimer(id, target) {
    function hitung() {
      const diff = target - new Date().getTime();
      const el = document.getElementById('t-' + id);
      if (!el) return;
      if (diff <= 0) {
        el.innerHTML = "WAKTU HABIS!";
        el.style.color = "orange";
        return;
      }
      const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
      const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
      const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
      el.innerHTML = h + ':' + m + ':' + s;
    }
    hitung();
    intervals[id] = setInterval(hitung, 1000);
  }

  // Perintah memulai sesi bermain
  function start(id) {
    const jam = document.getElementById('h-' + id).value;
    const tipePS = document.getElementById('type-' + id).value;
    if (!jam || parseFloat(jam) <= 0) return alert("Isi durasi waktu terlebih dahulu!");
    
    google.script.run
      .withSuccessHandler(load)
      .withFailureHandler(tanganiError)
      .mulaiMain(id, parseFloat(jam), tipePS);
  }

  // Memasukkan belanjaan jajanan ke dalam billing aktif stasiun PS terpilih (Kompabilitas TomSelect 100%)
  function pesan(id) {
    const ts = tomSelectInstances[id];
    if (!ts) return alert("Sistem pencarian bermasalah.");

    const selectedValue = ts.getValue(); 
    if (!selectedValue || selectedValue === "") return alert("Silakan pilih jajanan terlebih dahulu!");

    const selectEl = document.getElementById('m-' + id);
    const selectedOption = selectEl.querySelector(`option[value="${selectedValue}"]`);
    
    if (!selectedOption) return alert("Data jajanan tidak valid.");

    const namaJajanan = selectedOption.getAttribute('data-nama');
    const harga = parseFloat(selectedOption.getAttribute('data-harga'));

    google.script.run
      .withSuccessHandler(load)
      .withFailureHandler(tanganiError)
      .tambahJajananKeSheet(id, namaJajanan, harga);
  }

  // Mencetak kupon prabayar kasir di awal transaksi
  function cetakKuponAwal(id) {
    const inputJam = document.getElementById('h-' + id).value;
    const tipePS = document.getElementById('type-' + id).value;
    if (!inputJam || parseFloat(inputJam) <= 0) return alert("Silakan isi jumlah Jam durasi sewa!");

    const durasiJam = parseFloat(inputJam);
    let hargaPerJam = 5000;
    if (tipePS === "PS4") hargaPerJam = 10000;
    
    const totalHargaKupon = durasiJam * hargaPerJam;
    const kodeUnik = "KP-" + Math.floor(1000 + Math.random() * 9000);
    
    let labelHeader = "RENTAL " + tipePS;
    if (tipePS === "WIFI") labelHeader = "SEWA WIFI";

    const winKupon = window.open("", "_blank");
    winKupon.document.write('<html><head><title>Kupon</title><style>body{font-family:monospace;width:52mm;font-size:10px;margin:0;padding:5px;}.text-center{text-align:center;}.line{border-top:1px dashed #000;margin:5px 0;}.box{border:1px solid #000;padding:3px;margin:3px 0;font-weight:bold;}</style></head><body><div class="text-center"><b>🎟️ KUPON ' + labelHeader + '</b><br>DODI JAYA GAME SOLUTION</div><div class="line"></div><div class="text-center box">' + kodeUnik + '</div>Layanan: ' + id + '<br>Durasi: ' + durasiJam + ' Jam<br>Total: Rp ' + totalHargaKupon.toLocaleString('id-ID') + '<div class="line"></div><div class="text-center"><b>STATUS: LUNAS DI AWAL</b></div></body></html>');
    winKupon.document.close();
    setTimeout(function(){ winKupon.print(); winKupon.close(); }, 300);
  }

  // Mencetak nota fisik billing rincian berjalan ke printer thermal (lebar kertas thermal standar 52mm-58mm)
  function cetakNotaLangsung(id) {
    const item = dataPSGlobal.find(p => p.noPS === id);
    if (!item) return alert("Data tidak ditemukan!");
    const waktuSekarang = new Date().toLocaleString('id-ID', { timeZone: 'Asia/Jakarta' });
    
    let riwayatJajananTeks = "Tidak ada";
    if (item.selesai && item.selesai.indexOf(" | Jrn:") !== -1) {
      riwayatJajananTeks = item.selesai.split(" | Jrn:")[1];
    }

    let judulNota = "BILLING RENTAL " + item.tipePS;
    if (item.tipePS === "WIFI") judulNota = "BILLING SEWA WIFI";

    const win = window.open("", "_blank");
    win.document.write('<html><head><title>Nota</title><style>body{font-family:monospace;width:52mm;font-size:10px;margin:0;padding:5px;}table{width:100%;font-size:10px;}.line{border-top:1px dashed #000;margin:5px 0;}</style></head><body><div style="text-align:center;"><b>' + judulNota + '</b><br>DODI JAYA GAME SOLUTION</div><div class="line"></div>Waktu Cetak: ' + waktuSekarang + '<br><table><tr><td>Station/Room</td><td>: ' + item.noPS + '</td></tr><tr><td>Durasi sewa</td><td>: ' + item.durasi + ' Jam</td></tr></table><div class="line"></div><b>Rincian Belanja Jajanan:</b><br>' + riwayatJajananTeks + '<div class="line"></div><table><tr><td><b>TOTAL BAYAR</b></td><td style="text-align:right;"><b>Rp ' + item.biaya.toLocaleString('id-ID') + '</b></td></tr></table><div class="line"></div><div style="text-align:center;margin-top:5px;">Terima Kasih Atas Kunjungan Anda!</div></body></html>');
    win.document.close();
    setTimeout(function(){ win.print(); win.close(); }, 300);
  }

  // Menarik laporan log akumulasi dari sheet backend untuk dicetak sebagai rekap omset bulanan kasir
  function cetakLaporanBulanan() {
    google.script.run
      .withSuccessHandler(function(dataLaporan) {
        if (!dataLaporan || dataLaporan.length === 0) return alert("Tidak ada data laporan log.");
        let total = 0;
        let baris = "";
        dataLaporan.forEach(log => {
          total += log.pemasukan;
          baris += '<tr><td>' + log.tanggal + ' - ' + log.noPS + '</td><td style="text-align: right;">Rp ' + log.pemasukan.toLocaleString('id-ID') + '</td></tr>';
        });

        const winLaporan = window.open("", "_blank");
        winLaporan.document.write('<html><head><title>Laporan</title><style>body{font-family:monospace;width:52mm;font-size:10px;margin:0;padding:5px;}table{width:100%;font-size:9px;}.line{border-top:1px dashed #000;margin:5px 0;}</style></head><body><div style="text-align:center;"><b>REKAP OMSET BULANAN</b></div><div class="line"></div><table> ' + baris + '</table><div class="line"></div><table><tr><td>TOTAL</td><td style="text-align:right;">Rp ' + total.toLocaleString('id-ID') + '</td></tr></table></body></html>');
        winLaporan.document.close();
        setTimeout(function(){ winLaporan.print(); winLaporan.close(); }, 300);
      })
      .withFailureHandler(tanganiError)
      .getLaporanBulanan();
  }

  // Menyelesaikan/mengakhiri sesi main station dan melakukan checkout database sheet
  function stop(id) {
    if (confirm("Selesaikan sesi " + id + " dan simpan laporan?")) {
      google.script.run
        .withSuccessHandler(load)
        .withFailureHandler(tanganiError)
        .resetPS(id);
    }
  }

  // Menjalankan inisialisasi load data pertama kali saat halaman diakses kasir
  window.onload = load;
</script>
</body>
</html>
