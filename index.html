<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BILLING PS DODI JAYA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', system-ui, sans-serif; }
        .navbar-custom { background-color: #0f172a; color: white; }
        .card-ps { border: none; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); transition: transform 0.2s; background: white; }
        .card-ps:hover { transform: translateY(-2px); }
        .badge-status { font-size: 0.85rem; padding: 6px 12px; border-radius: 30px; }
        .bg-tersedia { background-color: #10b981; color: white; }
        .bg-main { background-color: #ef4444; color: white; }
        .section-jajanan { background-color: #fffbeb; border: 1px dashed #f59e0b; border-radius: 8px; padding: 12px; }
        .btn-start { background-color: #1e293b; border: none; color: white; }
        .btn-start:hover { background-color: #334155; color: white; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.85); display: flex; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>

    <div id="loading" class="loading-overlay">
        <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
    </div>

    <nav class="navbar navbar-custom py-3 shadow-sm mb-4">
        <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
            <h4 class="m-0 fw-bold"><i class="fa-solid fa-gamepad me-2 text-info"></i> BILLING PS DODI JAYA</h4>
            <div>
                <button class="btn btn-outline-light btn-sm me-2" onclick="alert('Fitur ini otomatis mencetak dari Sheet Laporan Anda.')"><i class="fa-solid fa-print me-1"></i> CETAK BULANAN</button>
                <button class="btn btn-info btn-sm text-white fw-bold" onclick="muatData()"><i class="fa-solid fa-rotate me-1"></i> REFRESH DATA</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="row g-4" id="container-ps">
            </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // =========================================================================
        // URL WEB APP GOOGLE APPS SCRIPT ANDA SUDAH TERPASANG DI BAWAH INI
        // =========================================================================
        const API_URL = "https://script.google.com/macros/s/AKfycbwG6ziAwlZpX3b0bvOZJkTn_od5RLOYFXVxLAzLkBLHGN2Yvy5oCjWwhzp6iUcnmrHA/exec";

        let menuJajananGlobal = [];
        let timerIntervals = {};

        $(document).ready(function() {
            muatData();
        });

        function toggleLoading(show) {
            if (show) $('#loading').fadeIn(150);
            else $('#loading').fadeOut(150);
        }

        // Ambil data terbaru dari Google Sheets via API JSONP
        function muatData() {
            toggleLoading(true);
            
            // Bersihkan interval timer lama agar tidak menumpuk memori
            Object.keys(timerIntervals).forEach(key => clearInterval(timerIntervals[key]));
            timerIntervals = {};

            $.ajax({
                url: API_URL,
                jsonp: "callback",
                dataType: "jsonp",
                data: { action: "getAppData" },
                success: function(response) {
                    toggleLoading(false);
                    if (response.error) {
                        alert("Error dari server: " + response.error);
                        return;
                    }
                    menuJajananGlobal = response.menu;
                    renderDashboard(response.ps);
                },
                error: function() {
                    toggleLoading(false);
                    alert("Gagal terhubung ke Google Apps Script. Periksa koneksi internet atau status Deployment.");
                }
            });
        }

        // Fungsi membuat elemen visual kartu PS secara dinamis
        function renderDashboard(dataPS) {
            const container = $('#container-ps');
            container.empty();

            dataPS.forEach(ps => {
                const isMain = ps.status.includes("MAIN");
                const badgeClass = isMain ? "bg-main" : "bg-tersedia";
                const statusLabel = isMain ? ps.status : "Tersedia";

                // Generate opsi dropdown jajanan dari Sheet 'MenuJajanan'
                let opsiJajanan = `<option value="">-- Pilih Jajanan Kasir --</option>`;
                menuJajananGlobal.forEach(item => {
                    opsiJajanan += `<option value="${item[1]}" data-nama="${item[0]}">${item[0]} (Rp${Number(item[1]).toLocaleString('id-ID')})</option>`;
                });

                // Cek rincian jajanan dari string kolom Selesai (E)
                let textJajanan = "Belum jajan";
                let jajanBadgeClass = "text-danger text-decoration-underline";
                if (ps.selesai && ps.selesai.includes(" | Jrn: ")) {
                    textJajanan = ps.selesai.split(" | Jrn: ")[1];
                    jajanBadgeClass = "text-success fw-bold";
                }

                // Ambil jam selesai asli murni (sebelum dipisah string jajanan)
                let jamSelesaiMurni = ps.selesai ? ps.selesai.split(" | ")[0] : "";

                let cardHtml = `
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="card card-ps p-3">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="fw-bold m-0 text-secondary"><i class="fa-solid fa-tv me-1 text-primary"></i> ${ps.noPS}</h5>
                            <span class="badge badge-status ${badgeClass}">
                                <i class="fa-solid ${isMain ? 'fa-gamepad' : 'fa-circle-check'} me-1"></i> ${statusLabel}
                            </span>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted mb-1">Pilih Mesin / Layanan:</label>
                            <select class="form-select form-select-sm" id="tipe-${ps.noPS}" ${isMain ? 'disabled' : ''}>
                                <option value="PLAYSTATION 3" ${ps.status.includes("PS3") ? "selected" : ""}>PLAYSTATION 3 (Rp5.000/Jam)</option>
                                <option value="PLAYSTATION 4" ${ps.status.includes("PS4") ? "selected" : ""}>PLAYSTATION 4 (Rp10.000/Jam)</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted mb-1">Set Jam Main:</label>
                            ${isMain ? `
                                <div class="p-2 border bg-light rounded text-center">
                                    <div class="text-muted small mb-1">Mulai: <b>${ps.mulai}</b> | Selesai: <b>${jamSelesaiMurni}</b></div>
                                    <div class="fw-bold text-danger fs-5" id="timer-${ps.noPS}">Menghitung sisa...</div>
                                </div>
                            ` : `
                                <input type="number" class="form-control form-control-sm" id="jam-${ps.noPS}" placeholder="Berapa jam? misal: 2" step="0.5" min="0.5">
                            `}
                        </div>

                        <div class="d-grid gap-2 mb-3">
                            ${isMain ? `
                                <button class="btn btn-danger btn-sm fw-bold py-2 shadow-sm" onclick="stopBilling('${ps.noPS}', ${ps.biaya})">
                                    <i class="fa-solid fa-stopwatch me-1"></i> STOP BILLING (Rp${ps.biaya.toLocaleString('id-ID')})
                                </button>
                            ` : `
                                <button class="btn btn-start btn-sm fw-bold py-2 shadow-sm" onclick="startBilling('${ps.noPS}')">
                                    START BILLING
                                </button>
                            `}
                        </div>

                        <div class="section-jajanan shadow-inner">
                            <label class="form-label small fw-bold text-warning-emphasis mb-1"><i class="fa-solid fa-cookie-bite me-1"></i> Menu Jajanan Kasir:</label>
                            <div class="row g-2">
                                <div class="col-8">
                                    <select class="form-select form-select-sm" id="jajan-${ps.noPS}" ${!isMain ? 'disabled' : ''}>
                                        ${opsiJajanan}
                                    </select>
                                </div>
                                <div class="col-4 d-grid">
                                    <button class="btn btn-warning btn-sm fw-bold text-white" onclick="beliJajanan('${ps.noPS}')" ${!isMain ? 'disabled' : ''}>
                                        + Masuk
                                    </button>
                                </div>
                            </div>
                            <div class="mt-2 small text-muted">
                                <span><b>Item:</b> <span class="${jajanBadgeClass}">${textJajanan}</span></span>
                            </div>
                        </div>

                    </div>
                </div>`;

                container.append(cardHtml);

                // Jalankan jam hitung mundur aktif jika unit sedang dipakai main
                if (isMain && jamSelesaiMurni) {
                    initLiveTimer(ps.noPS, jamSelesaiMurni);
                }
            });
        }

        // Mesin hitung mundur real-time
        function initLiveTimer(id, jamSelesaiStr) {
            function hitung() {
                const sekarang = new Date();
                const partWaktu = jamSelesaiStr.split(":");
                
                let target = new Date();
                target.setHours(parseInt(partWaktu[0], 10), parseInt(partWaktu[1], 10), 0, 0);

                // Mengatasi jika durasi main melewati tengah malam
                if (target < sekarang) {
                    target.setDate(target.getDate() + 1);
                }

                const selisih = target - sekarang;

                if (selisih <= 0) {
                    $(`#timer-${id}`).html(`<span class="badge bg-danger p-2 text-white">🛑 WAKTU HABIS!</span>`);
                    clearInterval(timerIntervals[id]);
                    return;
                }

                const jam = Math.floor(selisih / (1000 * 60 * 60));
                const menit = Math.floor((selisih % (1000 * 60 * 60)) / (1000 * 60));
                const detik = Math.floor((selisih % (1000 * 60)) / 1000);

                $(`#timer-${id}`).html(`<i class="fa-regular fa-clock me-1 text-warning"></i> Sisa: ${jam.toString().padStart(2,'0')}:${menit.toString().padStart(2,'0')}:${detik.toString().padStart(2,'0')}`);
            }

            hitung();
            timerIntervals[id] = setInterval(hitung, 1000);
        }

        // Jalankan perintah Mulai Billing ke Google Sheets
        function startBilling(id) {
            const jam = $(`#jam-${id}`).val();
            const tipe = $(`#tipe-${id}`).val();

            if (!jam || parseFloat(jam) <= 0) {
                alert("Harap isi durasi jam main terlebih dahulu!");
                return;
            }

            toggleLoading(true);
            $.ajax({
                url: API_URL,
                jsonp: "callback",
                dataType: "jsonp",
                data: {
                    action: "mulaiMain",
                    id: id,
                    jam: jam,
                    tipe: tipe
                },
                success: function(res) {
                    if (res.success) muatData();
                    else { alert("Gagal: " + res.error); toggleLoading(false); }
                }
            });
        }

        // Tambahkan item jajanan ke billing PS yang aktif
        function beliJajanan(id) {
            const selectOption = $(`#jajan-${id} option:selected`);
            const nama = selectOption.data('nama');
            const harga = selectOption.val();

            if (!harga) {
                alert("Pilih jenis jajanan kasir!");
                return;
            }

            toggleLoading(true);
            $.ajax({
                url: API_URL,
                jsonp: "callback",
                dataType: "jsonp",
                data: {
                    action: "tambahJajanan",
                    id: id,
                    nama: nama,
                    harga: harga
                },
                success: function(res) {
                    if (res.success) muatData();
                    else { alert("Gagal: " + res.error); toggleLoading(false); }
                }
            });
        }

        // Hentikan billing, catat total uang ke laporan, dan kosongkan unit PS
        function stopBilling(id, totalBiaya) {
            if (!confirm(`Konfirmasi pembayaran untuk ${id}.\nTotal tagihan billing + jajanan: Rp${totalBiaya.toLocaleString('id-ID')}\n\nLanjutkan untuk cetak arsip laporan dan reset status?`)) {
                return;
            }

            toggleLoading(true);
            $.ajax({
                url: API_URL,
                jsonp: "callback",
                dataType: "jsonp",
                data: { action: "resetPS", id: id },
                success: function(res) {
                    if (res.success) muatData();
                    else { alert("Gagal: " + res.error); toggleLoading(false); }
                }
            });
        }
    </script>
</body>
</html>
