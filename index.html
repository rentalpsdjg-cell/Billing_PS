<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
  <style>
    body { background-color: #f0f2f5; font-family: sans-serif; padding: 15px; }
    .card-ps { border: none; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .timer { font-size: 2.2rem; font-weight: bold; color: #d63031; font-family: monospace; }
    .status-badge { font-size: 0.8rem; padding: 5px 15px; border-radius: 50px; font-weight: bold; }
    .jajanan-section { background: #fff9db; padding: 12px; border-radius: 10px; border: 2px dashed #f59f00; margin-top: 15px; }
    .list-jajanan-lokal { font-size: 0.85rem; color: #d63031; margin-top: 5px; font-weight: bold; }
  </style>
</head>
<body>

<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-4 mt-2">
    <h2 class="fw-bold text-primary m-0">BILLING PS DODI JAYA</h2>
    <div>
      <button onclick="cetakLaporanBulanan()" class="btn btn-warning fw-bold shadow-sm me-2">📊 Cetak Bulanan</button>
      <button onclick="load()" class="btn btn-dark shadow-sm">🔄 REFRESH DATA</button>
    </div>
  </div>

  <div id="content" class="row">
    <div class="text-center mt-5 py-5">
      <div class="spinner-border text-primary mb-3" role="status"></div>
      <h4>🔄 Memuat Sistem Kasir...</h4>
      <p class="text-muted small">Menghubungkan ke database...</p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>

<script>
  let intervals = {};
  let menuGlobal = [];
  let dataPSGlobal = [];
  let tomSelectInstances = {};

  function load() {
    Object.keys(tomSelectInstances).forEach(k => {
      if(tomSelectInstances[k]) { try { tomSelectInstances[k].destroy(); } catch(e) {} }
    });
    tomSelectInstances = {};
    
    document.getElementById('content').innerHTML = `
      <div class="text-center col-12 mt-5 py-5">
        <div class="spinner-border text-primary mb-3" role="status"></div>
        <h4>🔄 Memuat Data Terbaru...</h4>
      </div>
    `;
    
    // Memanggil fungsi utama di Kode.gs
    google.script.run
      .withSuccessHandler(render)
      .withFailureHandler(tanganiError)
      .getAppData();
  }

  function tanganiError(err) {
    document.getElementById('content').innerHTML = `
      <div class="col-12 mt-4">
        <div class="alert alert-danger text-center shadow-sm" role="alert">
          <h4 class="fw-bold">⚠️ SISTEM EROR DI KODE.GS!</h4>
          <p class="mb-2">Fungsi getAppData() gagal merespon balik ke halaman web.</p>
          <hr>
          <div class="text-start bg-light p-3 font-monospace rounded small mb-3 text-dark">
            <b>Pesan Eror:</b> ${err.message || JSON.stringify(err)}
          </div>
          <button onclick="load()" class="btn btn-danger fw-bold">Coba Hubungkan Ulang</button>
        </div>
      </div>
    `;
  }

  function render(data) {
    Object.keys(intervals).forEach(k => clearInterval(intervals[k]));
    menuGlobal = data.menu || [];
    dataPSGlobal = data.ps || [];
    const container = document.getElementById('content');
    container.innerHTML = '';

    dataPSGlobal.forEach(item => {
      const isMain = item.status.includes("🔴 MAIN") || item.status.includes("🔴 SEWA");
      
      let options = `<option value="">Cari/Pilih Jajanan...</option>`;
      options += menuGlobal.map((m, index) => {
        return `<option value="${index}-${m[1]}" data-nama="${m[0]}" data-harga="${m[1]}">${m[0]} (Rp ${parseInt(m[1]).toLocaleString('id-ID')})</option>`;
      }).join('');

      let jamSelesaiTampil = item.selesai;
      let riwayatJajananTeks = "";
      if (item.selesai && item.selesai.indexOf(" | Jrn:") !== -1) {
        let bagian = item.selesai.split(" | Jrn:");
        jamSelesaiTampil = bagian[0];
        riwayatJajananTeks = bagian[1];
      }

      const div = document.createElement('div');
      div.className = 'col-md-4';
      
      let htmlContent = `
        <div class="card card-ps">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center">
              <h4 class="m-0 fw-bold text-dark">${item.noPS}</h4>
              <span class="status-badge ${isMain ? 'bg-danger text-white' : 'bg-success text-white'}">${item.status}</span>
            </div>
            <hr class="my-2">
      `;

      if (isMain) {
        htmlContent += `
          <div class="text-center timer my-2" id="t-${item.noPS}">--:--:--</div>
          <p class="text-center text-muted small mb-3">Selesai: <b>${jamSelesaiTampil}</b> | Total: <b>Rp ${item.biaya.toLocaleString('id-ID')}</b></p>
          <button onclick="cetakNotaLangsung('${item.noPS}')" class="btn btn-outline-secondary w-100 fw-bold mb-2">🖨️ CETAK NOTA</button>
          <button onclick="stop('${item.noPS}')" class="btn btn-danger w-100 fw-bold mb-2">SELESAI & BAYAR</button>
        `;
      } else {
        htmlContent += `
          <div class="py-2">
            <label class="small text-muted fw-bold mb-1">Pilih Mesin / Layanan:</label>
            <select id="type-${item.noPS}" class="form-select mb-2">
              <option value="PS3">🎮 PLAYSTATION 3 (Rp5.000/Jam)</option>
              <option value="PS4">🎮 PLAYSTATION 4 (Rp10.000/Jam)</option>
              <option value="WIFI">📶 SEWA WIFI (Rp5.000/Jam)</option>
            </select>
            <label class="small text-muted fw-bold mb-1">Atur Durasi (Jam):</label>
            <div class="input-group mb-3">
              <input type="number" id="h-${item.noPS}" class="form-control" placeholder="Contoh: 2">
              <button onclick="start('${item.noPS}')" class="btn btn-success px-4 fw-bold">MULAI</button>
            </div>
          </div>
        `;
      }

      htmlContent += `
        <div class="jajanan-section">
          <select id="m-${item.noPS}" class="form-select">${options}</select>
          <button onclick="pesan('${item.noPS}')" class="btn btn-warning btn-sm w-100 fw-bold text-dark mt-2" ${isMain ? '' : 'disabled'}>➕ Masukkan Jajanan</button>
          <div class="list-jajanan-lokal" id="list-jajanan-${item.noPS}">
            ${riwayatJajananTeks ? 'Terbeli: ' + riwayatJajananTeks : 'Belum belanja jajanan'}
          </div>
        </div>
      `;

      htmlContent += '</div></div>';
      div.innerHTML = htmlContent;
      container.appendChild(div);
      
      setTimeout(function() {
        try {
          tomSelectInstances[item.noPS] = new TomSelect(`#m-${item.noPS}`, { create: false, placeholder: "Ketik jajanan..." });
        } catch(e) {}
      }, 50);
      
      if (isMain && item.selesaiRaw) { runTimer(item.noPS, item.selesaiRaw); }
    });
  }

  function runTimer(id, target) {
    function hitung() {
      const diff = target - new Date().getTime();
      const el = document.getElementById('t-' + id);
      if (!el) return;
      if (diff <= 0) { el.innerHTML = "WAKTU HABIS!"; return; }
      const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
      const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
      const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
      el.innerHTML = h + ':' + m + ':' + s;
    }
    hitung();
    intervals[id] = setInterval(hitung, 1000);
  }

  function start(id) {
    const jam = document.getElementById('h-' + id).value;
    const tipePS = document.getElementById('type-' + id).value;
    if (!jam || parseFloat(jam) <= 0) return alert("Isi durasi terlebih dahulu!");
    google.script.run.withSuccessHandler(load).withFailureHandler(tanganiError).mulaiMain(id, parseFloat(jam), tipePS);
  }

  function pesan(id) {
    const ts = tomSelectInstances[id];
    const val = ts.getValue();
    if (!val) return alert("Pilih jajanan dulu!");
    const opt = document.getElementById('m-' + id).querySelector(`option[value="${val}"]`);
    google.script.run.withSuccessHandler(load).withFailureHandler(tanganiError).tambahJajananKeSheet(id, opt.getAttribute('data-nama'), parseFloat(opt.getAttribute('data-harga')));
  }

  function stop(id) {
    if (confirm("Selesaikan sesi " + id + "?")) {
      google.script.run.withSuccessHandler(load).withFailureHandler(tanganiError).resetPS(id);
    }
  }
  
  window.onload = load;
</script>
</body>
</html>
