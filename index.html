<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: #f4f6f9; padding: 20px; color: #333; }
    .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid #ddd; }
    .title { color: #2c3e50; font-weight: bold; }
    .btn { padding: 8px 16px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; transition: 0.2s; }
    .btn-dark { background-color: #2c3e50; color: white; }
    .btn-success { background-color: #2ecc71; color: white; width: 100%; margin-top: 5px; }
    .btn-danger { background-color: #e74c3c; color: white; width: 100%; margin-bottom: 8px; }
    .btn-warning { background-color: #f1c40f; color: #333; width: 100%; margin-top: 5px; }
    .row { display: flex; flex-wrap: wrap; margin: 0 -10px; }
    .col { flex: 0 0 33.333%; padding: 0 10px; margin-bottom: 20px; }
    @media (max-width: 768px) { .col { flex: 0 0 100%; } }
    .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e0e0e0; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .ps-title { font-size: 1.3rem; font-weight: bold; }
    .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; color: white; }
    .bg-success { background-color: #2ecc71; }
    .bg-danger { background-color: #e74c3c; }
    .timer { font-size: 2rem; font-weight: bold; text-align: center; color: #e74c3c; font-family: monospace; margin: 10px 0; }
    .info-text { text-align: center; font-size: 0.85rem; color: #7f8c8d; margin-bottom: 12px; }
    .form-group { margin-bottom: 8px; }
    .form-group label { display: block; font-size: 0.75rem; font-weight: bold; color: #7f8c8d; margin-bottom: 4px; }
    .form-control { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.9rem; }
    .jajanan-box { background-color: #fffde7; border: 1px dashed #f1c40f; padding: 10px; border-radius: 8px; margin-top: 10px; }
    .jajanan-list { font-size: 0.8rem; color: #c0392b; font-weight: bold; margin-top: 5px; }
    .loading-screen { text-align: center; padding: 50px 0; width: 100%; }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .alert-error { background-color: #fde8e7; color: #9c241a; padding: 20px; border-radius: 8px; border: 1px solid #f5c2be; text-align: center; width: 100%; }
  </style>
</head>
<body>

<div class="header-bar">
  <h2 class="title">BILLING PS DODI JAYA</h2>
  <button onclick="load()" class="btn btn-dark">🔄 REFRESH DATA</button>
</div>

<div id="content" class="row">
  <div class="loading-screen">
    <div class="spinner"></div>
    <h3>Memuat Sistem Kasir...</h3>
    <p style="color: #7f8c8d; font-size: 0.9rem; margin-top: 5px;">Sedang mengambil data dari Google Sheet...</p>
  </div>
</div>

<script>
  let intervals = {};
  let menuGlobal = [];
  let dataPSGlobal = [];

  // Ambil data langsung dari server Kode.gs
  function load() {
    Object.keys(intervals).forEach(k => clearInterval(intervals[k]));
    
    document.getElementById('content').innerHTML = `
      <div class="loading-screen">
        <div class="spinner"></div>
        <h3>Sinkronisasi Database...</h3>
      </div>
    `;
    
    google.script.run
      .withSuccessHandler(render)
      .withFailureHandler(tanganiError)
      .getAppData();
  }

  // Menangkap error jika Google Sheets gagal merespon
  function tanganiError(err) {
    document.getElementById('content').innerHTML = `
      <div class="alert-error">
        <h3 style="margin-bottom: 10px;">⚠️ Hubungan ke Google Sheet Terputus!</h3>
        <p style="font-size: 0.9rem; margin-bottom: 15px;">Pesan: ${err.message || JSON.stringify(err)}</p>
        <button onclick="load()" class="btn btn-dark">Coba Hubungkan Ulang</button>
      </div>
    `;
  }

  // Membuat visualisasi komponen kotak kasir secara murni (Pure JS)
  function render(data) {
    menuGlobal = data.menu || [];
    dataPSGlobal = data.ps || [];
    const container = document.getElementById('content');
    container.innerHTML = '';

    dataPSGlobal.forEach(item => {
      const isMain = item.status.includes("🔴 MAIN") || item.status.includes("🔴 SEWA");
      
      // Menggunakan dropdown bawaan komputer agar dijamin 100% anti-error
      let options = `<option value="">-- Pilih Jajanan --</option>`;
      menuGlobal.forEach((m, idx) => {
        if(m[0]) {
          options += `<option value="${idx}" data-nama="${m[0]}" data-harga="${m[1]}">${m[0]} (Rp ${parseInt(m[1]).toLocaleString('id-ID')})</option>`;
        }
      });

      let jamSelesaiTampil = item.selesai || "";
      let riwayatJajananTeks = "";
      if (item.selesai && item.selesai.indexOf(" | Jrn:") !== -1) {
        let bagian = item.selesai.split(" | Jrn:");
        jamSelesaiTampil = bagian[0];
        riwayatJajananTeks = bagian[1];
      }

      const col = document.createElement('div');
      col.className = 'col';
      
      let cardHTML = `
        <div class="card">
          <div class="card-header">
            <span class="ps-title">${item.noPS}</span>
            <span class="badge ${isMain ? 'bg-danger' : 'bg-success'}">${item.status}</span>
          </div>
      `;

      if (isMain) {
        cardHTML += `
          <div class="timer" id="t-${item.noPS}">--:--:--</div>
          <div class="info-text">Selesai: <b>${jamSelesaiTampil}</b><br>Total: <b>Rp ${item.biaya.toLocaleString('id-ID')}</b></div>
          <button onclick="cetakNotaLangsung('${item.noPS}')" class="btn btn-dark" style="width:100%; margin-bottom:5px;">🖨️ CETAK NOTA</button>
          <button onclick="stop('${item.noPS}')" class="btn btn-danger">SELESAI & BAYAR</button>
        `;
      } else {
        cardHTML += `
          <div class="form-group">
            <label>Jenis Layanan:</label>
            <select id="type-${item.noPS}" class="form-control">
              <option value="PS3">🎮 PLAYSTATION 3 (Rp5.000/Jam)</option>
              <option value="PS4">🎮 PLAYSTATION 4 (Rp10.000/Jam)</option>
              <option value="WIFI">📶 SEWA WIFI (Rp5.000/Jam)</option>
            </select>
          </div>
          <div class="form-group">
            <label>Durasi Main (Jam):</label>
            <input type="number" id="h-${item.noPS}" class="form-control" placeholder="Contoh: 2" min="0.5" step="0.5">
          </div>
          <button onclick="start('${item.noPS}')" class="btn btn-dark" style="width:100%;">MULAI SEWA</button>
        `;
      }

      // Panel Jajanan Kasir
      cardHTML += `
          <div class="jajanan-box">
            <label style="font-size:0.75rem; font-weight:bold; color:#7f8c8d;">🛒 Tambah Jajanan:</label>
            <select id="m-${item.noPS}" class="form-control" style="margin-top:4px;">${options}</select>
            <button onclick="pesan('${item.noPS}')" class="btn btn-warning" ${isMain ? '' : 'disabled'}>➕ Masukkan ke Billing</button>
            <div class="jajanan-list" id="list-jajanan-${item.noPS}">
              ${riwayatJajananTeks ? 'Terbeli: ' + riwayatJajananTeks : 'Belum ada jajanan'}
            </div>
          </div>
        </div>
      `;

      col.innerHTML = cardHTML;
      container.appendChild(col);

      if (isMain && item.selesaiRaw) {
        runTimer(item.noPS, item.selesaiRaw);
      }
    });
  }

  // Perhitungan Waktu Mundur Realtime
  function runTimer(id, target) {
    function hitung() {
      const diff = target - new Date().getTime();
      const el = document.getElementById('t-' + id);
      if (!el) return;
      if (diff <= 0) {
        el.innerHTML = "WAKTU HABIS!";
        el.style.color = "#f39c12";
        return;
      }
      const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
      const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
      const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
      el.innerHTML = h + ':' + m + ':' + s;
    }
    hitung();
    intervals[id] = setInterval(hitung, 1000);
  }

  function start(id) {
    const jam = document.getElementById('h-' + id).value;
    const tipePS = document.getElementById('type-' + id).value;
    if (!jam || parseFloat(jam) <= 0) return alert("Silakan isi durasi bermain!");
    google.script.run.withSuccessHandler(load).withFailureHandler(tanganiError).mulaiMain(id, parseFloat(jam), tipePS);
  }

  function pesan(id) {
    const selectEl = document.getElementById('m-' + id);
    const val = selectEl.value;
    if (!val) return alert("Pilih item jajanan dulu!");
    
    const opt = selectEl.options[selectEl.selectedIndex];
    const nama = opt.getAttribute('data-nama');
    const harga = parseFloat(opt.getAttribute('data-harga'));

    google.script.run.withSuccessHandler(load).withFailureHandler(tanganiError).tambahJajananKeSheet(id, nama, harga);
  }

  function stop(id) {
    if (confirm("Selesaikan billing untuk " + id + "?")) {
      google.script.run.withSuccessHandler(load).withFailureHandler(tanganiError).resetPS(id);
    }
  }

  function cetakNotaLangsung(id) {
    const item = dataPSGlobal.find(p => p.noPS === id);
    if (!item) return alert("Data tidak ditemukan!");
    let riwayat = "Tidak ada";
    if (item.selesai && item.selesai.indexOf(" | Jrn:") !== -1) {
      riwayat = item.selesai.split(" | Jrn:")[1];
    }
    const win = window.open("", "_blank");
    win.document.write('<html><head><title>Nota</title><style>body{font-family:monospace;width:52mm;font-size:10px;margin:0;padding:5px;}table{width:100%;font-size:10px;}.line{border-top:1px dashed #000;margin:5px 0;}</style></head><body><div style="text-align:center;"><b>BILLING RENTAL PS</b><br>DODI JAYA</div><div class="line"></div>Station: ' + item.noPS + '<br>Durasi: ' + item.durasi + ' Jam<br><div class="line"></div>Jajanan:<br>' + riwayat + '<div class="line"></div><b>TOTAL: Rp ' + item.biaya.toLocaleString('id-ID') + '</b></body></html>');
    win.document.close();
    setTimeout(function(){ win.print(); win.close(); }, 300);
  }

  window.onload = load;
</script>
</body>
</html>
